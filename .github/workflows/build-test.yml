name: Build Test

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platforms to build
        required: true
        type: choice
        default: all
        options:
          - all
          - linux
          - windows

concurrency:
  group: delray-build-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: 1.96.0
  CARGO_ZIGBUILD_VERSION: 0.23.0
  ZIG_VERSION: 0.16.0
  NPCAP_SDK_VERSION: 1.16
  NPCAP_SDK_URL: https://npcap.com/dist/npcap-sdk-1.16.zip
  NPCAP_SDK_SHA256: F0A8BE7778EE3AE1B99BBBECB27A3FF0F6C111A4093F1C78C5C5A099607184DB

jobs:
  metadata:
    name: build-metadata
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.metadata.outputs.short_sha }}
    steps:
      - name: Capture commit identifier
        id: metadata
        run: echo "short_sha=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

  build-linux:
    name: build-linux
    if: inputs.platform == 'all' || inputs.platform == 'linux'
    needs: metadata
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-build-test-rust-${{ env.RUST_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-test-rust-${{ env.RUST_VERSION }}-
      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install --yes libpcap-dev
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --version "$CARGO_ZIGBUILD_VERSION" --locked
      - name: Build Linux distribution binary
        run: cargo zigbuild --release --locked --target x86_64-unknown-linux-gnu.2.28
      - name: Verify Linux binary baseline
        run: |
          binary=target/x86_64-unknown-linux-gnu/release/delray
          test -x "$binary"
          readelf -d "$binary" | grep -q 'libpcap.so'
          max_glibc="$(readelf --version-info "$binary" | grep -oE 'GLIBC_[0-9.]+' | sed 's/GLIBC_//' | sort -V | tail -1)"
          test "$(printf '%s\n' "$max_glibc" "2.28" | sort -V | tail -1)" = "2.28"
      - name: Package Linux binary
        env:
          BUILD_SHA: ${{ needs.metadata.outputs.short_sha }}
        run: |
          mkdir -p dist
          tar -C target/x86_64-unknown-linux-gnu/release \
            -czf "dist/delray-${BUILD_SHA}-linux-x86_64.tar.gz" delray
      - uses: actions/upload-artifact@v7
        with:
          name: delray-${{ needs.metadata.outputs.short_sha }}-linux-x86_64
          path: dist/delray-*.tar.gz
          if-no-files-found: error
          retention-days: 14

  build-windows:
    name: build-windows
    if: inputs.platform == 'all' || inputs.platform == 'windows'
    needs: metadata
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      RUSTFLAGS: -C target-feature=+crt-static
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: actions/cache@v6
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            target
          key: ${{ runner.os }}-build-test-rust-${{ env.RUST_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-test-rust-${{ env.RUST_VERSION }}-
      - uses: actions/cache@v6
        with:
          path: ${{ runner.temp }}\npcap-sdk-${{ env.NPCAP_SDK_VERSION }}.zip
          key: ${{ runner.os }}-npcap-sdk-${{ env.NPCAP_SDK_VERSION }}-${{ env.NPCAP_SDK_SHA256 }}
      - name: Prepare Npcap SDK
        shell: pwsh
        run: |
          $archive = Join-Path $env:RUNNER_TEMP "npcap-sdk-$env:NPCAP_SDK_VERSION.zip"
          $extract = Join-Path $env:RUNNER_TEMP "npcap-sdk-$env:NPCAP_SDK_VERSION"
          if (-not (Test-Path $archive)) {
            Invoke-WebRequest -UseBasicParsing -Uri $env:NPCAP_SDK_URL -OutFile $archive
          }
          $actual = (Get-FileHash -Algorithm SHA256 $archive).Hash
          if ($actual -ne $env:NPCAP_SDK_SHA256) {
            throw "Npcap SDK SHA-256 mismatch: expected $env:NPCAP_SDK_SHA256, got $actual"
          }
          if (Test-Path $extract) {
            Remove-Item -LiteralPath $extract -Recurse -Force
          }
          Expand-Archive -LiteralPath $archive -DestinationPath $extract
          $libdir = Join-Path $extract 'Lib\x64'
          if (-not (Test-Path (Join-Path $libdir 'wpcap.lib'))) { throw 'wpcap.lib is missing' }
          if (-not (Test-Path (Join-Path $libdir 'Packet.lib'))) { throw 'Packet.lib is missing' }
          "LIBPCAP_LIBDIR=$libdir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Build Windows distribution binary
        run: cargo build --release --locked
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Verify Windows binary dependencies
        shell: pwsh
        run: |
          $binary = 'target\release\delray.exe'
          if (-not (Test-Path $binary)) { throw 'delray.exe is missing' }
          $dependencies = (dumpbin /DEPENDENTS $binary | Out-String)
          if ($dependencies -match 'VCRUNTIME140\.dll|MSVCP140\.dll|api-ms-win-crt') {
            throw 'Windows binary still depends on the dynamic VC Runtime'
          }
          if ($dependencies -notmatch 'wpcap\.dll') {
            throw 'Windows binary does not declare wpcap.dll'
          }
      - name: Package Windows binary
        env:
          BUILD_SHA: ${{ needs.metadata.outputs.short_sha }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Compress-Archive -Path 'target\release\delray.exe' -DestinationPath "dist\delray-$env:BUILD_SHA-windows-x86_64.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: delray-${{ needs.metadata.outputs.short_sha }}-windows-x86_64
          path: dist/delray-*.zip
          if-no-files-found: error
          retention-days: 14

  checksums:
    name: checksums
    if: always() && (needs.build-linux.result == 'success' || needs.build-windows.result == 'success')
    needs: [metadata, build-linux, build-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: delray-${{ needs.metadata.outputs.short_sha }}-*
          path: dist
          merge-multiple: true
      - name: Create checksums
        shell: bash
        run: |
          cd dist
          shopt -s nullglob
          archives=(delray-*.tar.gz delray-*.zip)
          test "${#archives[@]}" -gt 0
          sha256sum "${archives[@]}" > SHA256SUMS
      - uses: actions/upload-artifact@v7
        with:
          name: delray-${{ needs.metadata.outputs.short_sha }}-checksums
          path: dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 14
